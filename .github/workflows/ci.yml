name: CI DEV

on:
  push:
    branches:
      - DEV
      - main

  workflow_dispatch:
  
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Compilar y correr tests
        run: mvn clean verify -Dspring.profiles.active=test -e

      - name: Subir reportes de Surefire
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn

      - name: Subir JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: graphite-client-jar
          path: target/graphite-client-0.0.1-SNAPSHOT.jar
          if-no-files-found: error
  deploy-dev:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/DEV'
    runs-on: [self-hosted, Windows, X64, backend, dev, graphite]

    steps:
      - name: Descargar JAR generado
        uses: actions/download-artifact@v4
        with:
          name: graphite-client-jar
          path: C:\deploy\graphite-client

      - name: Validar artifact descargado
        shell: cmd
        run: dir C:\deploy\graphite-client

      - name: Detener servicio DEV
        shell: cmd
        run: |
          net stop graphite-client-dev || exit /b 0

      - name: Crear carpeta backup si no existe
        shell: cmd
        run: |
          if not exist C:\apps\graphite-client\backup mkdir C:\apps\graphite-client\backup

      - name: Respaldar JAR actual
        shell: cmd
        run: |
          if exist C:\apps\graphite-client\graphite-client.jar (
            copy C:\apps\graphite-client\graphite-client.jar C:\apps\graphite-client\backup\graphite-client-%GITHUB_RUN_NUMBER%.jar
          )
      
      - name: Conservar últimos 6 backups DEV
        shell: powershell
        run: |
          $backups = Get-ChildItem "C:\apps\graphite-client\backup\graphite-client-*.jar" |
                     Sort-Object LastWriteTime -Descending

          $backups | Select-Object -Skip 6 | Remove-Item -Force

          Write-Host "Backups conservados:"
          Get-ChildItem "C:\apps\graphite-client\backup\graphite-client-*.jar" |
          Sort-Object LastWriteTime -Descending |
          Select-Object Name, LastWriteTime

      - name: Copiar nuevo JAR
        shell: cmd
        run: |
          copy C:\deploy\graphite-client\graphite-client-0.0.1-SNAPSHOT.jar C:\apps\graphite-client\graphite-client.jar /Y

      - name: Validar JAR desplegado
        shell: cmd
        run: dir C:\apps\graphite-client\*.jar

      - name: Iniciar servicio DEV
        shell: cmd
        run: net start graphite-client-dev

      - name: Esperar arranque
        shell: cmd
        run: ping 127.0.0.1 -n 31 > nul

      - name: Validar servicio Windows
        shell: cmd
        run: |
          sc query graphite-client-dev

      - name: Validar puerto 8081
        shell: cmd
        run: |
          netstat -ano | findstr :8081

      - name: Esperar Health DEV
        shell: powershell
        run: |
          $url = "http://localhost:8081/graphite-client/actuator/health"
          $maxAttempts = 12

          for ($i = 1; $i -le $maxAttempts; $i++) {

            Write-Host "Intento $i de $maxAttempts"

            try {
              $response = Invoke-RestMethod `
                -Uri $url `
                -TimeoutSec 10

              Write-Host "Health OK"

              $response | ConvertTo-Json -Depth 10

              exit 0
            }
            catch {
              Write-Host $_.Exception.Message
              Start-Sleep -Seconds 5
            }
          }

          Write-Host "El servicio nunca respondió al health endpoint"

          sc.exe query graphite-client-dev

          netstat -ano | findstr :8081

          exit 1

  deploy-main:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Windows, X64, backend, graphite-client, prod]

    steps:
      - name: Descargar JAR generado
        uses: actions/download-artifact@v4
        with:
          name: graphite-client-jar
          path: C:\deploy\graphite-client

      - name: Validar artifact descargado
        shell: cmd
        run: dir C:\deploy\graphite-client

      - name: Detener servicio PROD
        shell: cmd
        run: |
          net stop graphite-client-prod || exit /b 0

      - name: Crear carpeta backup si no existe
        shell: cmd
        run: |
          if not exist C:\apps\graphite-client\backup mkdir C:\apps\graphite-client\backup

      - name: Respaldar JAR actual
        shell: cmd
        run: |
          if exist C:\apps\graphite-client\graphite-client.jar (
            copy C:\apps\graphite-client\graphite-client.jar C:\apps\graphite-client\backup\graphite-client-%GITHUB_RUN_NUMBER%.jar
          )

      - name: Copiar nuevo JAR
        shell: cmd
        run: |
          copy C:\deploy\graphite-client\graphite-client-0.0.1-SNAPSHOT.jar C:\apps\graphite-client\graphite-client.jar /Y

      - name: Validar JAR desplegado
        shell: cmd
        run: dir C:\apps\graphite-client\*.jar

      - name: Iniciar servicio PROD
        shell: cmd
        run: net start graphite-client-prod

      - name: Esperar arranque
        shell: cmd
        run: ping 127.0.0.1 -n 31 > nul

      - name: Validar servicio Windows
        shell: cmd
        run: |
          sc query graphite-client-prod

      - name: Validar puerto 8081
        shell: cmd
        run: |
          netstat -ano | findstr :8081

      - name: Esperar Health PROD
        shell: powershell
        run: |
          $url = "http://localhost:8081/graphite-client/actuator/health"
          $maxAttempts = 12

          for ($i = 1; $i -le $maxAttempts; $i++) {

            Write-Host "Intento $i de $maxAttempts"

            try {
              $response = Invoke-RestMethod `
                -Uri $url `
                -TimeoutSec 10

              Write-Host "Health OK"

              $response | ConvertTo-Json -Depth 10

              exit 0
            }
            catch {
              Write-Host $_.Exception.Message
              Start-Sleep -Seconds 5
            }
          }

          Write-Host "El servicio nunca respondió al health endpoint"

          sc.exe query graphite-client-prod

          netstat -ano | findstr :8081

          exit 1