name: CI DEV

on:
  push:
    branches:
      - DEV
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Compilar y correr tests
        run: mvn clean verify -Dspring.profiles.active=test -e

      - name: Subir reportes de Surefire
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          if-no-files-found: warn

      - name: Subir JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: graphite-client-jar
          path: target/graphite-client-0.0.1-SNAPSHOT.jar
          if-no-files-found: error

  deploy-dev:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/DEV'
    runs-on: [self-hosted, Windows, X64, backend, dev, graphite]

    steps:
      - name: Limpiar artifacts previos DEV
        shell: cmd
        run: |
          if exist C:\deploy\graphite-client (
            del /Q C:\deploy\graphite-client\*.jar
          )

      - name: Descargar JAR generado
        uses: actions/download-artifact@v4
        with:
          name: graphite-client-jar
          path: C:\deploy\graphite-client

      - name: Validar artifact descargado
        shell: cmd
        run: dir C:\deploy\graphite-client

      - name: Detener servicio DEV
        shell: cmd
        run: |
          net stop graphite-client-dev || exit /b 0

      - name: Crear carpeta backup si no existe
        shell: cmd
        run: |
          if not exist C:\apps\graphite-client\backup mkdir C:\apps\graphite-client\backup

      - name: Respaldar JAR actual
        shell: cmd
        run: |
          if exist C:\apps\graphite-client\graphite-client.jar (
            copy C:\apps\graphite-client\graphite-client.jar C:\apps\graphite-client\backup\graphite-client-%GITHUB_RUN_NUMBER%.jar
          )

      - name: Limpiar backups antiguos DEV
        shell: powershell
        run: |
          $backups = Get-ChildItem "C:\apps\graphite-client\backup\graphite-client-*.jar" |
                     Sort-Object LastWriteTime -Descending

          $backups | Select-Object -Skip 10 | Remove-Item -Force

      - name: Mostrar backups conservados
        shell: powershell
        run: |
          Get-ChildItem "C:\apps\graphite-client\backup\graphite-client-*.jar" |
          Sort-Object LastWriteTime -Descending

      - name: Copiar nuevo JAR
        shell: cmd
        run: |
          copy C:\deploy\graphite-client\graphite-client-0.0.1-SNAPSHOT.jar C:\apps\graphite-client\graphite-client.jar /Y

      - name: Validar JAR desplegado
        shell: cmd
        run: dir C:\apps\graphite-client\*.jar

      - name: Iniciar servicio DEV
        shell: cmd
        run: net start graphite-client-dev

      - name: Esperar arranque
        shell: cmd
        run: ping 127.0.0.1 -n 16 > nul

      - name: Validar health DEV
        shell: cmd
        run: curl http://localhost:8081/graphite-client/actuator/health

  deploy-main:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Windows, X64, backend, graphite-client, prod]

    steps:
      - name: Limpiar artifacts previos PROD
        shell: cmd
        run: |
          if exist C:\deploy\graphite-client (
            del /Q C:\deploy\graphite-client\*.jar
          )

      - name: Descargar JAR generado
        uses: actions/download-artifact@v4
        with:
          name: graphite-client-jar
          path: C:\deploy\graphite-client

      - name: Validar artifact descargado
        shell: cmd
        run: dir C:\deploy\graphite-client

      - name: Detener servicio PROD
        shell: cmd
        run: |
          net stop graphite-client-prod || exit /b 0

      - name: Crear carpeta backup si no existe
        shell: cmd
        run: |
          if not exist C:\apps\graphite-client\backup mkdir C:\apps\graphite-client\backup

      - name: Respaldar JAR actual
        shell: cmd
        run: |
          if exist C:\apps\graphite-client\graphite-client.jar (
            copy C:\apps\graphite-client\graphite-client.jar C:\apps\graphite-client\backup\graphite-client-%GITHUB_RUN_NUMBER%.jar
          )

      - name: Limpiar backups antiguos PROD
        shell: powershell
        run: |
          $backups = Get-ChildItem "C:\apps\graphite-client\backup\graphite-client-*.jar" |
                     Sort-Object LastWriteTime -Descending

          $backups | Select-Object -Skip 10 | Remove-Item -Force

      - name: Mostrar backups conservados
        shell: powershell
        run: |
          Get-ChildItem "C:\apps\graphite-client\backup\graphite-client-*.jar" |
          Sort-Object LastWriteTime -Descending

      - name: Copiar nuevo JAR
        shell: cmd
        run: |
          copy C:\deploy\graphite-client\graphite-client-0.0.1-SNAPSHOT.jar C:\apps\graphite-client\graphite-client.jar /Y

      - name: Validar JAR desplegado
        shell: cmd
        run: dir C:\apps\graphite-client\*.jar

      - name: Iniciar servicio PROD
        shell: cmd
        run: net start graphite-client-prod

      - name: Esperar arranque
        shell: cmd
        run: ping 127.0.0.1 -n 16 > nul

      - name: Validar health PROD
        shell: cmd
        run: curl http://localhost:8081/graphite-client/actuator/health